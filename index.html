<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Ícone e Cor do Navegador (UI/UX) -->
    <link rel="icon" type="image/png" href="/assets/logo.png" />
    <meta name="theme-color" content="#ffffff" />
    
    <!-- SEO Básico -->
    <title>DevolvaFácil | Descomplicamos a sua devolução</title>
    <meta name="description" content="Plataforma de logística reversa integrada com Correios e ERPs. Reduza custos operacionais e padronize as devoluções da sua empresa de forma simples e rápida." />
    <meta name="keywords" content="logística reversa, devolução de produtos, integração ERP, drop off, centro de distribuição, postalgow, devolução fácil" />
    <meta http-equiv="content-language" content="pt-br" />
    
    <!-- Autoridade, Indexação e URL Canônica -->
    <meta name="author" content="Grupo PostalGow" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://devolvafacil.com.br/" />

    <!-- Open Graph (Compartilhamento no WhatsApp e LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://devolvafacil.com.br/" />
    <meta property="og:title" content="DevolvaFácil | Logística Reversa Inteligente" />
    <meta property="og:description" content="A solução definitiva para automatizar e padronizar as devoluções da sua empresa. Integre com seu ERP e reduza custos." />
    <meta property="og:image" content="https://devolvafacil.com.br/assets/logodevolva.png" />
    
    <!-- Twitter Cards (Compartilhamento no Slack, Teams e X) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DevolvaFácil | Logística Reversa Inteligente" />
    <meta name="twitter:description" content="Automatize e padronize as devoluções da sua empresa com facilidade." />
    <meta name="twitter:image" content="https://devolvafacil.com.br/assets/logodevolva.png" />

    <!-- SEO Local (Geolocalização da Operação) -->
    <meta name="geo.region" content="BR-SP" />
    <meta name="geo.placename" content="Barueri" />
  </head>
  <body>
    <!-- Onde o React vai injetar o seu site inteiro -->
    <div id="root"></div>
    
    <!-- O script do Vite que faz a mágica acontecer -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
